const adToggle    = document.getElementById('ads-toggle-wrap');
const adLabel     = document.getElementById('ads-toggle-label');
const adSlots     = document.querySelectorAll('.ad-slot');

let adsDisabled = localStorage.getItem('trimfinder_ads_disabled') === 'true';

function applyAdsState() {
  adSlots.forEach(el => el.classList.toggle('hidden-ad', adsDisabled));
  adToggle.classList.toggle('ads-off', adsDisabled);
  adLabel.textContent = adsDisabled ? 'Ads Off ✓' : 'Disable Ads';
}

});

  "mat_terracotta":        `${GH}/terracotta.png`,
};
const TRIMS = [{"id": "sentry", "name": "Sentry", "location": "Pillager Outpost", "chance": 25, "chestType": "chest", "dupMaterial": "Cobblestone", "dupKey": "cobblestone", "lore": "Hidden in pillager outpost chests.", "biome": "Overworld", "dimension": "overworld"}, {"id": "dune", "name": "Dune", "location": "Desert Pyramid", "chance": 14.3, "chestType": "chest", "dupMaterial": "Sandstone", "dupKey": "sandstone", "lore": "Found inside the hidden chamber of desert pyramids.", "biome": "Desert", "dimension": "overworld"}, {"id": "coast", "name": "Coast", "location": "Shipwreck", "chance": 16.7, "chestType": "chest", "dupMaterial": "Cobblestone", "dupKey": "cobblestone", "lore": "Tucked away in sunken shipwreck chests.", "biome": "Ocean", "dimension": "overworld"}, {"id": "wild", "name": "Wild", "location": "Jungle Temple", "chance": 33.3, "chestType": "chest", "dupMaterial": "Mossy Cobblestone", "dupKey": "mossy_cobblestone", "lore": "Lurking within jungle temple treasure chests.", "biome": "Jungle", "dimension": "overworld"}, {"id": "ward", "name": "Ward", "location": "Ancient City", "chance": 5, "chestType": "chest", "dupMaterial": "Cobbled Deepslate", "dupKey": "cobbled_deepslate", "lore": "Rare and dangerous — found in the depths of ancient cities.", "biome": "Deep Dark", "dimension": "overworld"}, {"id": "silence", "name": "Silence", "location": "Ancient City", "chance": 1.2, "chestType": "chest", "dupMaterial": "Cobbled Deepslate", "dupKey": "cobbled_deepslate", "lore": "Incredibly rare. Only the bravest survive ancient cities to claim it.", "biome": "Deep Dark", "dimension": "overworld"}, {"id": "eye", "name": "Eye", "location": "Stronghold", "chance": 10, "chestType": "altar/library chest", "dupMaterial": "End Stone", "dupKey": "end_stone", "lore": "Guaranteed in library chests and found in altar chests of strongholds.", "biome": "Underground", "dimension": "overworld"}, {"id": "vex", "name": "Vex", "location": "Woodland Mansion", "chance": 50, "chestType": "chest", "dupMaterial": "Cobblestone", "dupKey": "cobblestone", "lore": "A 50% shot in the rare woodland mansion chests.", "biome": "Dark Forest", "dimension": "overworld"}, {"id": "tide", "name": "Tide", "location": "Ocean Monument", "chance": 20, "chestType": "Elder Guardian drop", "dupMaterial": "Prismarine", "dupKey": "prismarine", "lore": "Dropped by Elder Guardians guarding ocean monuments.", "biome": "Ocean", "dimension": "overworld"}, {"id": "snout", "name": "Snout", "location": "Bastion Remnant", "chance": 8.3, "chestType": "chest", "dupMaterial": "Blackstone", "dupKey": "blackstone", "lore": "Plundered from bastion remnant chests in the Nether.", "biome": "Nether", "dimension": "nether"}, {"id": "rib", "name": "Rib", "location": "Nether Fortress", "chance": 6.7, "chestType": "chest", "dupMaterial": "Netherrack", "dupKey": "netherrack", "lore": "Concealed within the dangerous halls of nether fortresses.", "biome": "Nether", "dimension": "nether"}, {"id": "spire", "name": "Spire", "location": "End City", "chance": 6.7, "chestType": "chest", "dupMaterial": "Purpur Block", "dupKey": "purpur_block", "lore": "Reward for conquering end cities beyond the main island.", "biome": "The End", "dimension": "end"}, {"id": "bolt", "name": "Bolt", "location": "Trial Chamber", "chance": 6.3, "chestType": "standard vault", "dupMaterial": "Copper Block", "dupKey": "copper_block", "lore": "Found in standard vaults inside trial chambers. Requires a trial key.", "biome": "Underground", "dimension": "overworld"}, {"id": "flow", "name": "Flow", "location": "Trial Chamber", "chance": 22.5, "chestType": "ominous vault", "dupMaterial": "Breeze Rod", "dupKey": "breeze_rod", "lore": "Found in ominous vaults — need an ominous trial key from bad omen.", "biome": "Underground", "dimension": "overworld"}, {"id": "wayfinder", "name": "Wayfinder", "location": "Trail Ruins", "chance": 8.3, "chestType": "suspicious gravel", "dupMaterial": "Terracotta", "dupKey": "terracotta", "lore": "Brushed out of suspicious gravel in trail ruins structures.", "biome": "Various", "dimension": "overworld"}, {"id": "raiser", "name": "Raiser", "location": "Trail Ruins", "chance": 8.3, "chestType": "suspicious gravel", "dupMaterial": "Terracotta", "dupKey": "terracotta", "lore": "Brushed out of suspicious gravel in trail ruins structures.", "biome": "Various", "dimension": "overworld"}, {"id": "shaper", "name": "Shaper", "location": "Trail Ruins", "chance": 8.3, "chestType": "suspicious gravel", "dupMaterial": "Terracotta", "dupKey": "terracotta", "lore": "Brushed out of suspicious gravel in trail ruins structures.", "biome": "Various", "dimension": "overworld"}, {"id": "host", "name": "Host", "location": "Trail Ruins", "chance": 8.3, "chestType": "suspicious gravel", "dupMaterial": "Terracotta", "dupKey": "terracotta", "lore": "Brushed out of suspicious gravel in trail ruins structures.", "biome": "Various", "dimension": "overworld"}];

function img(key, size=28) {
  const src = IMGS[key] || `${GH}/${key.replace(/^(trim_|mat_)/,'').replace(/_armor_trim/,'')}.png`;
  return `<img src="${src}" alt="${key}" style="width:${size}px;height:${size}px" onerror="this.style.opacity=0">`;
}
function getRarityClass(c) {
  if (c < 2) return 'chance-very-rare';
  if (c < 8) return 'chance-rare';
  if (c < 20) return 'chance-uncommon';
  return 'chance-common';
}
function getRarityLabel(c) {
  if (c < 2) return '💀 Legendary';
  if (c < 8) return '🔴 Very Rare';
  if (c < 20) return '🟡 Uncommon';
  return '🟢 Common';
}
function getDimBadge(dim) {
  const m = { overworld:['dim-overworld','🌿 Overworld'], nether:['dim-nether','🔥 Nether'], end:['dim-end','🌌 The End'] };
  const [cls, label] = m[dim] || m.overworld;
  return `<span class="dim-badge ${cls}">${label}</span>`;
}
function getLocIcon(biome) {
  const m = {Desert:'🏜️',Ocean:'🌊',Jungle:'🌴','Deep Dark':'🕯️',Underground:'⛏️','Dark Forest':'🌲',Nether:'🔥','The End':'🌌',Various:'🗺️',Overworld:'🌿'};
  return m[biome] || '📦';
}
function getSourceLabel(t) {
  if (t.chestType === 'Elder Guardian drop') return 'Kill Elder Guardian';
  if (t.chestType === 'suspicious gravel') return 'Brush suspicious gravel';
  if (t.chestType === 'standard vault') return 'Vault (Trial Key)';
  if (t.chestType === 'ominous vault') return 'Ominous Vault (Ominous Key)';
  return 'Open chest';
}
function calcProb(chance, n) {
  return ((1 - Math.pow(1 - chance/100, n)) * 100).toFixed(1);
}
function buildCraftGrid(trim) {
  const D    = `<div class="craft-cell">${img('mat_diamond')}</div>`;
  const MAT  = `<div class="craft-cell">${img('mat_' + trim.dupKey)}</div>`;
  const TRIM = `<div class="craft-cell">${img('trim_' + trim.id)}</div>`;
  const dSrc = IMGS['mat_diamond'] || '';
  return `
  <div>
    <div class="craft-title">Duplication Recipe</div>
    <div class="craft-wrap">
      <div class="craft-grid">
        ${D}${D}${D}
        ${D}${MAT}${D}
        ${D}${TRIM}${D}
      </div>
      <div class="craft-arrow">→</div>
      <div class="craft-right">
        <div class="craft-output">${img('trim_' + trim.id, 34)}</div>
        <div class="craft-x2">×2</div>
        <div class="craft-diamond-list">
          <div class="dl-row"><img src="${dSrc}" alt="diamond"> <strong>7×</strong> Diamond</div>
          <div class="dl-row">${img('mat_'+trim.dupKey,14)} <strong>1×</strong> ${trim.dupMaterial}</div>
          <div class="dl-row">${img('trim_'+trim.id,14)} <strong>1×</strong> Template</div>
        </div>
      </div>
    </div>
  </div>`;
}

let found = JSON.parse(localStorage.getItem('trimfinder_found') || '[]');
let currentFilter = 'all';

function save() { localStorage.setItem('trimfinder_found', JSON.stringify(found)); }
function updateProgress() {
  const c = found.length, t = TRIMS.length;
  document.getElementById('progressCount').textContent = `${c} / ${t}`;
  document.getElementById('progressBar').style.width = (c/t*100)+'%';
}
function applyFilter() {
  document.querySelectorAll('.card').forEach(card => {
    const isFnd = found.includes(card.dataset.id);
    card.classList.toggle('hidden',
      currentFilter === 'found' ? !isFnd :
      currentFilter === 'missing' ? isFnd : false
    );
  });
}

function buildCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  TRIMS.forEach((trim, idx) => {
    const isFnd = found.includes(trim.id);
    const trimSrc = IMGS['trim_'+trim.id] || `${GH}/${trim.id}_armor_trim_smithing_template.png`;
    const card = document.createElement('div');
    card.className = 'card' + (isFnd ? ' found' : '');
    card.dataset.id = trim.id;
    card.style.animationDelay = (idx * 0.03) + 's';
    const attemptsLabel = trim.chestType.includes('gravel') ? 'blocks brushed'
      : trim.chestType.includes('drop') ? 'kills'
      : (trim.chestType.includes('vault') || trim.id === 'bolt' || trim.id === 'flow') ? 'vaults opened'
      : 'chests opened';
    card.innerHTML = `
      <div class="found-badge">✓</div>
      <div class="card-header">
        <div class="card-img-wrap">
          <img src="${trimSrc}" alt="${trim.name}" onerror="this.style.opacity=0">
        </div>
        <div>
          <div class="card-name">${trim.name}</div>
          <div class="location-banner">${getLocIcon(trim.biome)} ${trim.location}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="meta-row">
          <span class="chance-badge ${getRarityClass(trim.chance)}">${getRarityLabel(trim.chance)} — ${trim.chance}%</span>
          ${getDimBadge(trim.dimension)}
        </div>
        <div class="source-row">
          <span class="source-label">How to get</span>
          <span class="source-val">${getSourceLabel(trim)}</span>
        </div>
        <div class="calc-box" onclick="event.stopPropagation()">
          <div class="calc-title">Probability Calculator</div>
          <div class="calc-row">
            <div class="calc-number-wrap">
              <button class="calc-btn" data-dir="-1" data-id="${trim.id}">−</button>
              <input class="calc-input" type="number" min="1" max="9999" value="1" id="inp-${trim.id}">
              <button class="calc-btn" data-dir="1" data-id="${trim.id}">+</button>
            </div>
            <span class="calc-label">${attemptsLabel}</span>
          </div>
          <div class="calc-result" id="calc-${trim.id}">~${calcProb(trim.chance, 1)}% <span>chance of finding at least one</span></div>
        </div>
        ${buildCraftGrid(trim)}
        <div class="lore-text">${trim.lore}</div>
      </div>
    `;
    card.addEventListener('click', (e) => {
      if (e.target.closest('.calc-box') || e.target.closest('.craft-wrap')) return;
      const i = found.indexOf(trim.id);
      if (i > -1) { found.splice(i,1); card.classList.remove('found'); }
      else { found.push(trim.id); card.classList.add('found'); }
      save(); updateProgress(); applyFilter();
    });
    card.querySelectorAll('.calc-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const inp = document.getElementById('inp-' + trim.id);
        let v = parseInt(inp.value) || 1;
        v = Math.max(1, Math.min(9999, v + parseInt(btn.dataset.dir)));
        inp.value = v;
        document.getElementById('calc-'+trim.id).innerHTML =
          `~${calcProb(trim.chance, v)}% <span>chance of finding at least one</span>`;
      });
    });
    card.querySelector('.calc-input').addEventListener('input', e => {
      const v = Math.max(1, parseInt(e.target.value) || 1);
      document.getElementById('calc-'+trim.id).innerHTML =
        `~${calcProb(trim.chance, v)}% <span>chance of finding at least one</span>`;
    });
    grid.appendChild(card);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilter();
  });
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Reset your entire collection? This cannot be undone.')) {
    found = [];
    save();
    currentFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-filter="all"]').classList.add('active');
    buildCards();
    updateProgress();
  }
});

buildCards();
updateProgress();
</script>
</body>
</html>
